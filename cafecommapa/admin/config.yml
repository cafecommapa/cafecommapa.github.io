backend:
  name: github
  repo: cafecommapa/cafecommapa.github.io
  branch: main

media_folder: "imagens"
public_folder: "/imagens"

collections:
  - name: "posts"
    label: "Posts"
    folder: "posts"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Data", name: "date", widget: "datetime"}
      - {label: "Imagem", name: "cover", widget: "image"}
      - {label: "Conteúdo", name: "body", widget: "markdown"}
