<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Café com Mapa</title>
  <link rel="stylesheet" href="css/style.css">
<!-- Fonte do título -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<header class="topo">

  <div class="header-linha">
    <img src="imagens/Logocafe.png" class="logo-header" alt="Café com Mapa">
    <h1 class="titulo-site">Café com Mapa</h1>

    

    <div class="relogio-mobile" aria-label="Relógio de Londres">
      <div class="relogio-analogico-mini">
        <span class="marcador marcador-12"></span>
        <span class="marcador marcador-3"></span>
        <span class="marcador marcador-6"></span>
        <span class="marcador marcador-9"></span>

        <span class="ponteiro hora" id="ponteiro-hora"></span>
        <span class="ponteiro minuto" id="ponteiro-minuto"></span>
        <span class="ponteiro segundo" id="ponteiro-segundo"></span>
        <span class="centro-relogio"></span>
      </div>
    </div>
  </div>

<div class="header-linha-2">

  <div class="header-linha-2-esquerda">
    <button class="botao-hamburguer" type="button" aria-label="Abrir menu">
      ☰ Menu
    </button>
  </div>

<div class="header-linha-2-direita">
  <div class="seletor-cidade-mobile">
    <button
      class="botao-hamburguer botao-hamburguer-direita"
      type="button"
      id="botao-cidade-mobile"
      aria-label="Selecionar cidade"
      aria-expanded="false">
      ☰ Londres
    </button>

    <div class="menu-cidades-mobile" id="menu-cidades-mobile">
      <button type="button" data-city="Londres" data-timezone="Europe/London">Londres</button>
      <button type="button" data-city="Nova York" data-timezone="America/New_York">Nova York</button>
      <button type="button" data-city="Paris" data-timezone="Europe/Paris">Paris</button>
      <button type="button" data-city="Los Angeles" data-timezone="America/Los_Angeles">Los Angeles</button>
      <button type="button" data-city="Brasil" data-timezone="America/Sao_Paulo">Brasil</button>
    </div>
  </div>
</div>

</div>

</header>

  <section id="clocks">
    <div id="clocks-grid"></div>
  </section>

  <main class="layout">
    <section id="posts-principais"></section>

    <aside class="sidebar">
      <div class="card-propaganda">
        <div class="card-propaganda-topo"></div>

        <div class="card-propaganda-conteudo">
          <p class="card-propaganda-label">Meus livros</p>

          <a href="#" class="card-propaganda-link">
            <img src="imagens/banner-livros.jpg" alt="Conheça meus livros" class="card-propaganda-img">
          </a>
        </div>
      </div>

      <div class="card">
        <h3>Últimos posts</h3>
        <div id="lista-posts"></div>
      </div>
    </aside>
  </main>

  <footer class="rodape">
    <div class="rodape-linha"></div>

    <div class="rodape-container">
      <div class="rodape-redes">
        <a href="https://instagram.com/cafecommapa" target="_blank" rel="noopener noreferrer">
          <span class="icone-instagram"></span>
          @cafecommapa
        </a>

        <a href="https://instagram.com/patrocarlos" target="_blank" rel="noopener noreferrer">
          <span class="icone-instagram"></span>
          @patrocarlos
        </a>
      </div>

      <div class="rodape-info">
        <p>© 2026 Café com Mapa</p>
        <p>Powered by GitHub Pages</p>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/blog.js"></script>

  <script>
  let cidadeAtual = "Londres";
  let timezoneAtual = "Europe/London";

  function atualizarRelogioAnalogicoMobile() {
    const horaEl = document.getElementById("ponteiro-hora");
    const minutoEl = document.getElementById("ponteiro-minuto");
    const segundoEl = document.getElementById("ponteiro-segundo");

    if (!horaEl || !minutoEl || !segundoEl) return;

    const agora = new Date();
    const agoraCidade = new Date(
      agora.toLocaleString("en-US", { timeZone: timezoneAtual })
    );

    const horas = agoraCidade.getHours();
    const minutos = agoraCidade.getMinutes();
    const segundos = agoraCidade.getSeconds();

    const grauHora = (horas % 12) * 30 + minutos * 0.5;
    const grauMinuto = minutos * 6 + segundos * 0.1;
    const grauSegundo = segundos * 6;

    horaEl.style.transform = `translateX(-50%) rotate(${grauHora}deg)`;
    minutoEl.style.transform = `translateX(-50%) rotate(${grauMinuto}deg)`;
    segundoEl.style.transform = `translateX(-50%) rotate(${grauSegundo}deg)`;
  }

  document.addEventListener("DOMContentLoaded", function () {
    const botaoCidade = document.getElementById("botao-cidade-mobile");
    const menuCidades = document.getElementById("menu-cidades-mobile");

    atualizarRelogioAnalogicoMobile();
    setInterval(atualizarRelogioAnalogicoMobile, 1000);

    if (botaoCidade && menuCidades) {
      botaoCidade.addEventListener("click", function () {
        const aberto = menuCidades.classList.toggle("aberto");
        botaoCidade.setAttribute("aria-expanded", aberto ? "true" : "false");
      });

      menuCidades.querySelectorAll("button").forEach(function (botao) {
        botao.addEventListener("click", function () {
          cidadeAtual = botao.dataset.city;
          timezoneAtual = botao.dataset.timezone;

          botaoCidade.textContent = `☰ ${cidadeAtual}`;
          menuCidades.classList.remove("aberto");
          botaoCidade.setAttribute("aria-expanded", "false");

          atualizarRelogioAnalogicoMobile();
        });
      });

      document.addEventListener("click", function (event) {
        if (!event.target.closest(".seletor-cidade-mobile")) {
          menuCidades.classList.remove("aberto");
          botaoCidade.setAttribute("aria-expanded", "false");
        }
      });
    }
  });
</script>

</body>
</html>
