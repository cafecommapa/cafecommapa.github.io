<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Café com Mapa</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="topo">
  <div>
    <a href="index.html" class="logo-link">
      <img src="imagens/Logocafe.png" class="logo-header" alt="Café com Mapa">
      <span class="logo-text">Café com Mapa</span>
    </a>

    <div class="relogio-mobile">
      <span class="relogio-mobile-cidade">Londres</span>
      <span class="relogio-mobile-hora" id="clock-mobile">--:--</span>
    </div>

    <nav>
      <a href="index.html">Início</a>
    </nav>
  </div>
</header>


<section id="clocks">

<div id="clocks-grid"></div>

</section>


<main class="layout">

<section id="posts-principais"></section>


<aside class="sidebar">

  <div class="card-propaganda">
    <div class="card-propaganda-topo"></div>

    <div class="card-propaganda-conteudo">
      <p class="card-propaganda-label">Meus livros</p>

      <a href="#" class="card-propaganda-link">
        <img src="imagens/banner-livros.jpg" alt="Conheça meus livros" class="card-propaganda-img">
      </a>
    </div>
  </div>

  <div class="card">
    <h3>Últimos posts</h3>
    <div id="lista-posts"></div>
  </div>

</aside>

</main>


<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script src="js/blog.js"></script>



<footer class="rodape">

  <div class="rodape-linha"></div>

  <div class="rodape-container">

    <div class="rodape-redes">

      <a href="https://instagram.com/cafecommapa" target="_blank">
        <span class="icone-instagram"></span>
        @cafecommapa
      </a>

      <a href="https://instagram.com/patrocarlos" target="_blank">
        <span class="icone-instagram"></span>
        @patrocarlos
      </a>

    </div>

    <div class="rodape-info">
      <p>© 2026 Café com Mapa</p>
      <p>Powered by GitHub Pages</p>
    </div>

  </div>

</footer>

<script>
  function atualizarRelogioMobile() {
    const el = document.getElementById("clock-mobile");
    if (!el) return;

    const hora = new Intl.DateTimeFormat("pt-BR", {
      hour: "2-digit",
      minute: "2-digit",
      hour12: false,
      timeZone: "Europe/London"
    }).format(new Date());

    el.textContent = hora;
  }

  atualizarRelogioMobile();
  setInterval(atualizarRelogioMobile, 60000);
</script>


</body>

</html>
