<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Café com Mapa</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="topo">
    <div class="header-linha">
      <img src="imagens/Logocafe.png" alt="Logo Café com Mapa" class="logo-header">

      <h1 class="titulo-site">Café com Mapa</h1>

      <div class="relogio-mobile" aria-hidden="true">
        <div class="relogio-analogico-mini">
          <span class="marcador marcador-12"></span>
          <span class="marcador marcador-3"></span>
          <span class="marcador marcador-6"></span>
          <span class="marcador marcador-9"></span>

          <span class="ponteiro hora" id="ponteiro-hora"></span>
          <span class="ponteiro minuto" id="ponteiro-minuto"></span>
          <span class="ponteiro segundo" id="ponteiro-segundo"></span>
          <span class="centro-relogio"></span>
        </div>
      </div>
    </div>

    <div class="header-linha-2">
      <div class="header-linha-2-esquerda">
        <button class="botao-hamburguer" type="button">☰ Menu</button>
      </div>

      <div class="header-linha-2-direita">
        <div class="seletor-cidade-mobile">
          <button id="botao-cidade-mobile" class="botao-hamburguer botao-hamburguer-direita" type="button">
            Nova York ▾
          </button>

          <div id="menu-cidades-mobile" class="menu-cidades-mobile">
            <button type="button" data-cidade="Nova York">Nova York</button>
            <button type="button" data-cidade="Londres">Londres</button>
            <button type="button" data-cidade="Paris">Paris</button>
            <button type="button" data-cidade="Los Angeles">Los Angeles</button>
            <button type="button" data-cidade="Brasil">Brasil</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <section id="clocks">
    <div id="clocks-grid"></div>
  </section>

  <main class="layout">
    <section id="posts-principais"></section>

    <aside class="sidebar">
      <h3>Últimos posts</h3>
      <ul id="lista-posts"></ul>

      <section class="card-propaganda" aria-label="Publicidade">
        <div class="card-propaganda-topo"></div>
        <div class="card-propaganda-conteudo">
          <div class="card-propaganda-label">Publicidade</div>
          <img src="imagens/banner-livros.jpg" alt="Publicidade" class="card-propaganda-img">
        </div>
      </section>
    </aside>
  </main>

  <footer class="rodape">
    <div class="rodape-linha"></div>

    <div class="rodape-container">
      <div class="rodape-redes">
        <a href="#" aria-label="Instagram">
          <span class="icone-instagram"></span>
          Instagram
        </a>
        <a href="#" aria-label="Contato por e-mail">Email</a>
        <a href="#" aria-label="Sobre o site">Sobre</a>
      </div>

      <div class="rodape-info">
        © 2026 Café com Mapa — Todos os direitos reservados
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/blog.js"></script>

  <script>
    function atualizarRelogioMini() {
      const agora = new Date();
      const hora = agora.getHours() % 12;
      const minuto = agora.getMinutes();
      const segundo = agora.getSeconds();

      const angHora = (hora * 30) + (minuto * 0.5);
      const angMinuto = minuto * 6;
      const angSegundo = segundo * 6;

      const ponteiroHora = document.getElementById("ponteiro-hora");
      const ponteiroMinuto = document.getElementById("ponteiro-minuto");
      const ponteiroSegundo = document.getElementById("ponteiro-segundo");

      if (ponteiroHora) {
        ponteiroHora.style.transform = `translateX(-50%) rotate(${angHora}deg)`;
      }
      if (ponteiroMinuto) {
        ponteiroMinuto.style.transform = `translateX(-50%) rotate(${angMinuto}deg)`;
      }
      if (ponteiroSegundo) {
        ponteiroSegundo.style.transform = `translateX(-50%) rotate(${angSegundo}deg)`;
      }
    }

    setInterval(atualizarRelogioMini, 1000);
    atualizarRelogioMini();

    const botaoCidade = document.getElementById("botao-cidade-mobile");
    const menuCidades = document.getElementById("menu-cidades-mobile");

    if (botaoCidade && menuCidades) {
      botaoCidade.addEventListener("click", function (e) {
        e.stopPropagation();
        menuCidades.classList.toggle("aberto");
      });

      document.querySelectorAll("#menu-cidades-mobile button").forEach((btn) => {
        btn.addEventListener("click", function () {
          botaoCidade.textContent = this.dataset.cidade + " ▾";
          menuCidades.classList.remove("aberto");
        });
      });

      document.addEventListener("click", function (e) {
        if (!menuCidades.contains(e.target) && !botaoCidade.contains(e.target)) {
          menuCidades.classList.remove("aberto");
        }
      });
    }
  </script>
</body>
</html>
