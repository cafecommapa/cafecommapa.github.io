<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Café com Mapa</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/posts.css">
  <link rel="stylesheet" href="css/mapa.css">
  <link rel="stylesheet" href="css/popups.css">
  <link rel="stylesheet" href="css/responsive.css">

  <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="js/core/utils.js"></script>
  <script defer src="js/core/lightbox.js"></script>
  <script defer src="js/core/relogios.js"></script>
  <script defer src="js/core/menu.js"></script>
  <script defer src="js/core/popups.js"></script>
  <script defer src="js/pages/home.js"></script>
  <script defer src="js/main.js"></script>
</head>
<body data-page="home">

  <header class="topo">
    <div class="header-linha">
      <a href="index.html" class="logo-link" aria-label="Página inicial">
        <img src="imagens/Logocafe.png" alt="Logo Café com Mapa" class="logo-header">
      </a>

      <h1 class="titulo-site">Café com Mapa</h1>

      <div class="relogio-mobile" aria-label="Relógio da cidade selecionada">
        <div class="relogio-analogico-mini">
          <span class="marcador marcador-12"></span>
          <span class="marcador marcador-3"></span>
          <span class="marcador marcador-6"></span>
          <span class="marcador marcador-9"></span>
          <span class="ponteiro hora" id="ponteiro-hora"></span>
          <span class="ponteiro minuto" id="ponteiro-minuto"></span>
          <span class="ponteiro segundo" id="ponteiro-segundo"></span>
          <span class="centro-relogio"></span>
        </div>
      </div>
    </div>

    <nav class="menu-principal" aria-label="Menu principal desktop">
      <a href="#" data-menu="inicio">Início</a>

      <div class="menu-dropdown">
        <button id="botao-categorias" type="button">Categorias ▾</button>
        <div id="menu-categorias" class="menu-dropdown-conteudo">
          <a href="#" data-categoria="viagem">Viagem</a>
          <a href="#" data-categoria="pensamento">Pensamento</a>
          <a href="#" data-categoria="receita">Receita</a>
          <a href="#" data-categoria="filme">Filme</a>
          <a href="#" data-categoria="tecnologia">Tecnologia</a>
        </div>
      </div>

      <a href="mapa.html">Mapa</a>
      <a href="#" data-popup-open="sobre">Sobre</a>
      <a href="#" data-popup-open="contato">Contato</a>
    </nav>

    <div class="header-linha-2">
      <div class="header-linha-2-esquerda">
        <button id="botao-menu-mobile" class="botao-hamburguer" type="button" aria-expanded="false">☰ Menu</button>
        <div id="menu-mobile-links" class="menu-mobile-links">
          <a href="index.html">Início</a>
          <a href="mapa.html">Mapa</a>
          <a href="#" data-popup-open="sobre">Sobre</a>
          <a href="#" data-popup-open="contato">Contato</a>
        </div>
      </div>

      <div class="header-linha-2-direita">
        <div class="seletor-cidade-mobile">
          <button id="botao-cidade-mobile" class="botao-hamburguer botao-hamburguer-direita" type="button" aria-expanded="false">☰ Nova York</button>
          <div id="menu-cidades-mobile" class="menu-cidades-mobile">
            <button type="button" data-cidade="Nova York" data-timezone="America/New_York">Nova York</button>
            <button type="button" data-cidade="Londres" data-timezone="Europe/London">Londres</button>
            <button type="button" data-cidade="Paris" data-timezone="Europe/Paris">Paris</button>
            <button type="button" data-cidade="Los Angeles" data-timezone="America/Los_Angeles">Los Angeles</button>
            <button type="button" data-cidade="Brasil" data-timezone="America/Sao_Paulo">Brasil</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <section id="clocks">
    <div id="clocks-grid"></div>
  </section>

  <main class="layout">
    <section id="posts-principais"></section>

    <aside class="sidebar">
      <h3>Últimos posts</h3>
      <ul id="lista-posts"></ul>

      <section class="card-propaganda" aria-label="Publicidade">
        <div class="card-propaganda-topo"></div>
        <div class="card-propaganda-conteudo">
          <div class="card-propaganda-label">Publicidade</div>
          <img src="imagens/banner-livros.jpg" alt="Publicidade" class="card-propaganda-img">
        </div>
      </section>
    </aside>
  </main>

  <footer class="rodape">
    <div class="rodape-linha"></div>
    <div class="rodape-container">
      <div class="rodape-redes">
        <a href="https://instagram.com/cafecommapas" target="_blank" rel="noopener noreferrer">
          <span class="icone-instagram-rodape"></span>
          @cafecommapas
        </a>
        <a href="https://instagram.com/patrocarlos" target="_blank" rel="noopener noreferrer">
          <span class="icone-instagram-rodape"></span>
          @patrocarlos
        </a>
      </div>
      <div class="rodape-info">© 2026 Café com Mapa — Powered by GitHub Pages</div>
    </div>
  </footer>

</body>
</html>
