<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Construtor MD</title>
<style>
body { font-family: Arial; margin:20px; }
input, textarea { width:100%; margin:5px 0; padding:8px; }
button { margin:5px; padding:8px 12px; }
.block { border:1px solid #ccc; padding:10px; margin:10px 0; }
.preview { white-space: pre-wrap; background:#f5f5f5; padding:10px; }
</style>
</head>
<body>

<h2>Construtor Markdown</h2>

<h3>Cabeçalho</h3>
<input id="title" placeholder="Título">
<input id="date" placeholder="Data (dd/mm/aaaa)">
<input id="criador" placeholder="Criador">
<input id="category" placeholder="Categoria">
<input id="summary" placeholder="Resumo">

<h3>Conteúdo</h3>
<div id="blocks"></div>

<button onclick="addText()">+ Texto</button>
<button onclick="addGallery()">+ Galeria</button>

<h3>Preview</h3>
<div id="preview" class="preview"></div>

<button onclick="generateMD()">Gerar MD</button>
<button onclick="downloadMD()">Baixar .md</button>

<script>
let blocks = [];

function addText(){
  blocks.push({type:'text', content:''});
  render();
}

function addGallery(){
  blocks.push({type:'gallery', images:[]});
  render();
}

function render(){
  const container = document.getElementById('blocks');
  container.innerHTML = '';
  blocks.forEach((b,i)=>{
    const div = document.createElement('div');
    div.className = 'block';

    if(b.type==='text'){
      const ta = document.createElement('textarea');
      ta.value = b.content;
      ta.oninput = e=>{ b.content = e.target.value; };
      div.appendChild(ta);
    }

    if(b.type==='gallery'){
      const input = document.createElement('input');
      input.type='file';
      input.multiple=true;
      input.onchange = e=>{
        for(let file of e.target.files){
          if(!/^[a-zA-Z0-9._-]+$/.test(file.name)){
            alert("Nome inválido: " + file.name);
            continue;
          }
          b.images.push({name:file.name, alt:''});
        }
        render();
      };
      div.appendChild(input);

      b.images.forEach((img,idx)=>{
        const alt = document.createElement('input');
        alt.placeholder="Alt";
        alt.value = img.alt;
        alt.oninput = e=>{ img.alt = e.target.value; };
        div.appendChild(document.createTextNode(img.name));
        div.appendChild(alt);
      });
    }

    container.appendChild(div);
  });
}

function formatDate(br){
  const p = br.split('/');
  return p.length===3 ? `${p[2]}-${p[1]}-${p[0]}` : br;
}

function slugify(text){
  return text.toLowerCase()
  .normalize("NFD").replace(/[̀-ͯ]/g,"")
  .replace(/[^a-z0-9]+/g,'-')
  .replace(/^-+|-+$/g,'');
}

function generateMD(){
  const title = document.getElementById('title').value;
  const mdDate = formatDate(document.getElementById('date').value);

  let md = `---\ntitle: ${title}\ndate: ${mdDate}\ncriador: ${document.getElementById('criador').value}\ncategory: ${document.getElementById('category').value}\nsummary: ${document.getElementById('summary').value}\n---\n\n`;

  blocks.forEach(b=>{
    if(b.type==='text'){
      md += b.content + "\n\n";
    }
    if(b.type==='gallery'){
      md += '<div class="galeria">\n';
      b.images.forEach(img=>{
        md += `<img src="imagens/${img.name}" alt="${img.alt}">\n`;
      });
      md += '</div>\n\n';
    }
  });

  document.getElementById('preview').innerText = md;
  window.generatedMD = md;
  window.fileName = slugify(title) + '.md';
}

function downloadMD(){
  const blob = new Blob([window.generatedMD], {type:'text/markdown'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = window.fileName || 'post.md';
  a.click();
}
</script>

</body>
</html>
