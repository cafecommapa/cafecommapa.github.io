<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa do Café com Mapa</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    #mapa{
      height:520px;
      border-radius:12px;
      margin-top:20px;
    }

    .pagina-mapa{
      max-width:1000px;
      margin:0 auto;
    }
  </style>
</head>
<body>

  <header class="topo">
    <div class="header-linha">
      <a href="index.html" class="logo-link" aria-label="Página inicial">
        <img src="imagens/Logocafe.png" alt="Logo Café com Mapa" class="logo-header">
      </a>

      <h1 class="titulo-site">Café com Mapa</h1>

      <div class="relogio-mobile" aria-label="Relógio da cidade selecionada">
        <div class="relogio-analogico-mini">
          <span class="marcador marcador-12"></span>
          <span class="marcador marcador-3"></span>
          <span class="marcador marcador-6"></span>
          <span class="marcador marcador-9"></span>

          <span class="ponteiro hora" id="ponteiro-hora"></span>
          <span class="ponteiro minuto" id="ponteiro-minuto"></span>
          <span class="ponteiro segundo" id="ponteiro-segundo"></span>
          <span class="centro-relogio"></span>
        </div>
      </div>
    </div>

    <nav class="menu-principal" aria-label="Menu principal desktop">
      <a href="index.html">Início</a>
      <a href="mapa.html">Mapa</a>
      <a href="sobre.html">Sobre</a>
      <a href="contato.html">Contato</a>
    </nav>

    <div class="header-linha-2">
      <div class="header-linha-2-esquerda">
        <button id="botao-menu-mobile" class="botao-hamburguer" type="button" aria-expanded="false">
          ☰ Menu
        </button>

        <div id="menu-mobile-links" class="menu-mobile-links">
          <a href="index.html">Início</a>
          <a href="mapa.html">Mapa</a>
          <a href="sobre.html">Sobre</a>
          <a href="contato.html">Contato</a>
        </div>
      </div>

      <div class="header-linha-2-direita">
        <div class="seletor-cidade-mobile">
          <button
            id="botao-cidade-mobile"
            class="botao-hamburguer botao-hamburguer-direita"
            type="button"
            aria-expanded="false">
            ☰ Nova York
          </button>

          <div id="menu-cidades-mobile" class="menu-cidades-mobile">
            <button type="button" data-cidade="Nova York" data-timezone="America/New_York">Nova York</button>
            <button type="button" data-cidade="Londres" data-timezone="Europe/London">Londres</button>
            <button type="button" data-cidade="Paris" data-timezone="Europe/Paris">Paris</button>
            <button type="button" data-cidade="Los Angeles" data-timezone="America/Los_Angeles">Los Angeles</button>
            <button type="button" data-cidade="Brasil" data-timezone="America/Sao_Paulo">Brasil</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="pagina-mapa">
    <section class="card-post">
      <h1>Nosso Mapa de Viagens</h1>
      <p>Explore os destinos do blog.</p>
      <div id="mapa"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script src="js/blog.js"></script>

  <script>
    const mapa = L.map("mapa", {
      minZoom: 2,
      maxZoom: 7
    });

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      noWrap: true,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(mapa);

const pontos = [];

cidadesMapa.forEach(function (cidade) {

  L.marker([cidade.lat, cidade.lng])
    .addTo(mapa)
    .bindPopup(
      `<b>${cidade.nome}</b><br>${cidade.texto}`
    );

  pontos.push([cidade.lat, cidade.lng]);

});


    const pontos = [];

    cidadesMapa.forEach(function (cidade) {
      L.marker([cidade.lat, cidade.lng])
        .addTo(mapa)
        .bindPopup(
          `<b>${cidade.nome}</b><br><a href="cidade.html?cidade=${cidade.slug}">Ver posts</a>`
        );

      pontos.push([cidade.lat, cidade.lng]);
    });

    if (pontos.length > 0) {
      mapa.fitBounds(pontos, {
        padding: [50, 50]
      });
    }
  </script>

</body>
</html>
