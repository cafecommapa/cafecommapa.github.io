<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa do Café com Mapa</title>

  <link rel="stylesheet" href="css/style.css">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    #mapa {
      height: 520px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .pagina-mapa {
      max-width: 1000px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <header class="topo">
    <div class="header-linha">
      <a href="index.html" class="logo-link">
        <img src="imagens/Logocafe.png" class="logo-header" alt="Café com Mapa">
        <span class="logo-text">Café com Mapa</span>
      </a>
    </div>
  </header>

  <main class="pagina-mapa">
    <section class="card-post">
      <h1>Nosso Mapa de Viagens</h1>
      <p>Explore os destinos do blog.</p>
      <div id="mapa"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const mapa = L.map("mapa", {
      minZoom: 2,
      maxZoom: 7
    });

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      noWrap: true,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(mapa);

    const cidades = [
      { nome: "Lisboa", slug: "lisboa", lat: 38.7223, lng: -9.1393 },
      { nome: "Madrid", slug: "madrid", lat: 40.4168, lng: -3.7038 },
      { nome: "Barcelona", slug: "barcelona", lat: 41.3851, lng: 2.1734 },
      { nome: "Roma", slug: "roma", lat: 41.9028, lng: 12.4964 },
      { nome: "Milão", slug: "milao", lat: 45.4642, lng: 9.1900 },

      { nome: "Nova York", slug: "nova-york", lat: 40.7128, lng: -74.0060 },
      { nome: "New Jersey", slug: "new-jersey", lat: 40.0583, lng: -74.4057 },
      { nome: "Toronto", slug: "toronto", lat: 43.6532, lng: -79.3832 },
      { nome: "Quebec City", slug: "quebec-city", lat: 46.8139, lng: -71.2080 },
      { nome: "Montreal", slug: "montreal", lat: 45.5017, lng: -73.5673 },
      { nome: "Miami", slug: "miami", lat: 25.7617, lng: -80.1918 },
      { nome: "Doral Miami", slug: "doral-miami", lat: 25.8195, lng: -80.3553 },

      { nome: "Rio de Janeiro", slug: "rio-de-janeiro", lat: -22.9068, lng: -43.1729 },
      { nome: "São Paulo", slug: "sao-paulo", lat: -23.5505, lng: -46.6333 },
      { nome: "Curitiba", slug: "curitiba", lat: -25.4284, lng: -49.2733 },
      { nome: "Porto Alegre", slug: "porto-alegre", lat: -30.0346, lng: -51.2177 },
      { nome: "Santiago", slug: "santiago", lat: -33.4489, lng: -70.6693 }
    ];

    const pontos = [];

    cidades.forEach(function (cidade) {
      L.marker([cidade.lat, cidade.lng])
        .addTo(mapa)
        .bindPopup(
          `<b>${cidade.nome}</b><br><a href="cidade.html?cidade=${cidade.slug}">Ver posts</a>`
        );

      pontos.push([cidade.lat, cidade.lng]);
    });

    if (pontos.length > 0) {
      mapa.fitBounds(pontos, {
        padding: [50, 50]
      });
    }
  </script>

</body>
</html>
